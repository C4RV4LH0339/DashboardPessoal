<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pessoal | SENAI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-chart-line"></i>
                    <span>AdminPro</span>
                </div>
                <button class="sidebar-toggle" id="sidebar-toggle">
                    <i class=" fas fa-bars"></i>
                </button>
                <nav class="sidebar-nav">
                    <ul>
                        <li class="active">
                            <a href="#">
                                <i class="fas fa-tachometer-alt"></i>
                                <span>Dashboard</span>
                            </a>
                        </li>
                        <li class="active">
                            <a href="#">
                                <i class="fas fa-users"></i>
                                <span>Usuários</span>
                            </a>
                        </li>
                        <li class="active">
                            <a href="#">
                                <i class="fas fa-shopping-cart"></i>
                                <span>Vendas</span>
                            </a>
                        </li>
                        <li class="active">
                            <a href="#">
                                <i class="fas fa-chart-bar"></i>
                                <span>Relatórios</span>
                            </a>
                        </li>
                        <li class="active">
                            <a href="#">
                                <i class="fas fa-cog">
                                </i>
                                <span>Configurações</span>
                                
                            </a>
                        </li>
                    </ul>
                </nav>
                <div class="sidebar-footer">
                    <a href="#">
                        <i class=" fas fa-sign-out-alt"></i>
                        <span>Sair</span>
                    </a>
                </div>
            </div>
        </aside>
<!--Conteúdo Principal-->
       <div class="main-content">
        <header class="topbar">
            <div class="search-area">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Pesquisar....">
            </div>
            <div class="user-area">
                <button class="dark-mode-toggle" id="darkModeToggle">
                    <i class=" fas fa-moon"></i>
                </button>
                <div class="notification">
                    <i class=" fas fa-bell"></i>
                    <span class="badge">4</span>
                </div>
                <div class="user-profile">
                    <img src="https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/1ea3dab9-2108-40e4-a0f2-b37bf4676e54/ddx0qlk-82c355e6-6f46-4cbe-a1e1-abd9e705bb74.jpg/v1/fill/w_1024,h_652,q_75,strp/toretto_s_1970_dodge_charger_fast_and_furious_by_professorwagstaff_ddx0qlk-fullview.jpg?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7ImhlaWdodCI6Ijw9NjUyIiwicGF0aCI6Ii9mLzFlYTNkYWI5LTIxMDgtNDBlNC1hMGYyLWIzN2JmNDY3NmU1NC9kZHgwcWxrLTgyYzM1NWU2LTZmNDYtNGNiZS1hMWUxLWFiZDllNzA1YmI3NC5qcGciLCJ3aWR0aCI6Ijw9MTAyNCJ9XV0sImF1ZCI6WyJ1cm46c2VydmljZTppbWFnZS5vcGVyYXRpb25zIl19.XZA16DoXJ0wkpucj6Cuqtr0BZ7SlOGs652Pe-yNjJBQ" width="50px">
                    <span>Davi de Souza</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </header>
        <main>
            <div class="page-header">
                <h1>Dashdboard</h1>
                <p>Bem-vindo de volta, Davi! Aqui está o resumo do seu negócio</p>
            </div>
            <div class="cards-grid">
                <div class="card">
                    <div class="card-icon">
                        <i class=" fas fa-dollar-sign"></i>
                    </div>
                    <div class="card-info">
                        <h3>Faturamento</h3>
                        <p class="value">R$ 65.780</p>
                        <span class="trend-up">+15,5%</span>
                    </div>
                    <div class="card">
                        <div class="card-icon">
                            <i class=" fas fa-users"></i>
                        </div>
                        <div class="card-info">
                            <h3>Clientes</h3>
                            <p class="value">1.500</p>
                            <span class="trend-up">+9,3%</span>
                        </div>
                        <div class="card">
                            <div class="card-icon">
                                <i class=" fas fa-shopping-bag"></i>
                            </div>
                            <div class="card-info">
                                <h3>Vendas</h3>
                                <p class="value">4.200</p>
                                <span class="trend down">-2,2%</span>
                            </div>
                            <div class="card">
                                <div class="card-icon">
                                    <i class=" fas fa-star"></i>
                                </div>
                                <div class="card-info">
                                    <h3>Conversão</h3>
                                    <p class="value">23,8%</p>
                                    <span class="trend-up">+6,7%</span>
                                </div>
                </div>
            </div>
            
        </main>
      </div>
    </div>
</body>
</html>
